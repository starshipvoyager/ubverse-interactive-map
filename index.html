  neutral:      { color: "#6b7280", name: "Unaffiliated" },
};

const TYPE = {
  wiki_real:      { label: "Wiki (Real Star)",   dot: "#60a5fa" },
  wiki_fictional: { label: "Wiki (Fictional)",   dot: "#c084fc" },
  real_added:     { label: "Real (Not in Wiki)", dot: "#34d399" },
};

export default function App() {
  const [sel,      setSel]      = useState(null);
  const [tip,      setTip]      = useState(null);
  const [tipPos,   setTipPos]   = useState({ x: 0, y: 0 });
  const [pan,      setPan]      = useState({ x: 0, y: 0 });
  const [zoom,     setZoom]     = useState(1);
  const [dragging, setDragging] = useState(false);
  const [lastPt,   setLastPt]   = useState(null);
  const [filter,   setFilter]   = useState("all");
  const [svgSize,  setSvgSize]  = useState({ w: 900, h: 540 });
  const [isMobile, setIsMobile] = useState(false);
  const svgRef    = useRef(null);
  const didDrag   = useRef(false);
  const pinchRef  = useRef(null); // { dist, zoom }

  useEffect(() => {
    const check = () => setIsMobile(window.innerWidth < 700);
    check();
    window.addEventListener("resize", check);
    return () => window.removeEventListener("resize", check);
  }, []);

  useEffect(() => {
    const el = svgRef.current;
    if (!el) return;
    const ro = new ResizeObserver(([e]) => {
      setSvgSize({ w: e.contentRect.width, h: e.contentRect.height });
    });
    ro.observe(el);
    return () => ro.disconnect();
  }, []);

  // ── Mouse wheel zoom ──
  const onWheel = useCallback((e) => {
    e.preventDefault();
    setZoom(z => Math.min(8, Math.max(0.2, z * (e.deltaY < 0 ? 1.12 : 0.9))));
  }, []);

  useEffect(() => {
    const el = svgRef.current;
    if (!el) return;
    el.addEventListener("wheel", onWheel, { passive: false });
    return () => el.removeEventListener("wheel", onWheel);
  }, [onWheel]);

  // ── Mouse events ──
  const onDown = (e) => {
    setDragging(true);
    setLastPt({ x: e.clientX, y: e.clientY });
    didDrag.current = false;
  };
  const onMove = (e) => {
    if (!dragging || !lastPt) return;
    const dx = e.clientX - lastPt.x, dy = e.clientY - lastPt.y;
    if (Math.abs(dx) + Math.abs(dy) > 3) didDrag.current = true;
    setPan(p => ({ x: p.x + dx, y: p.y + dy }));
    setLastPt({ x: e.clientX, y: e.clientY });
  };
  const onUp = () => { setDragging(false); setLastPt(null); };

  // ── Touch events ──
  const onTouchStart = useCallback((e) => {
    if (e.touches.length === 1) {
      const t = e.touches[0];
      setDragging(true);
      setLastPt({ x: t.clientX, y: t.clientY });
      didDrag.current = false;
    } else if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      pinchRef.current = { dist: Math.hypot(dx, dy), zoom };
      setDragging(false);
    }
  }, [zoom]);

  const onTouchMove = useCallback((e) => {
    e.preventDefault();
    if (e.touches.length === 1 && dragging && lastPt) {
      const t = e.touches[0];
      const dx = t.clientX - lastPt.x, dy = t.clientY - lastPt.y;
      if (Math.abs(dx) + Math.abs(dy) > 4) didDrag.current = true;
      setPan(p => ({ x: p.x + dx, y: p.y + dy }));
      setLastPt({ x: t.clientX, y: t.clientY });
    } else if (e.touches.length === 2 && pinchRef.current) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const newDist = Math.hypot(dx, dy);
      const scale = newDist / pinchRef.current.dist;
      setZoom(Math.min(8, Math.max(0.2, pinchRef.current.zoom * scale)));
    }
  }, [dragging, lastPt]);

  const onTouchEnd = useCallback((e) => {
    if (e.touches.length === 0) {
      setDragging(false);
      setLastPt(null);
      pinchRef.current = null;
    }
  }, []);

  useEffect(() => {
    const el = svgRef.current;
    if (!el) return;
    el.addEventListener("touchstart",  onTouchStart, { passive: false });
    el.addEventListener("touchmove",   onTouchMove,  { passive: false });
    el.addEventListener("touchend",    onTouchEnd,   { passive: false });
    return () => {
      el.removeEventListener("touchstart",  onTouchStart);
      el.removeEventListener("touchmove",   onTouchMove);
      el.removeEventListener("touchend",    onTouchEnd);
    };
  }, [onTouchStart, onTouchMove, onTouchEnd]);

  const shown = filter === "all" ? SYSTEMS : SYSTEMS.filter(s => s.type === filter);
  const cx = svgSize.w / 2 + pan.x;
  const cy = svgSize.h / 2 + pan.y;
  const voidCX = 390, voidCY = -138, voidRX = 155, voidRY = 140;

  return (
    <div style={{ background: "#04040e", minHeight: "100vh", color: "#e2e8f0",
      fontFamily: "'Courier New',Courier,monospace", display: "flex",
      flexDirection: "column", userSelect: "none" }}>

      {/* ── HEADER ── */}
      <div style={{ padding: "9px 18px", borderBottom: "1px solid #0e0e28",
        display: "flex", alignItems: "center", gap: 12,
        background: "#06061a", flexWrap: "wrap" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 9 }}>
          <span style={{ fontSize: 22, color: "#818cf8" }}>⬡</span>
          <div>
            <div style={{ fontSize: 14, fontWeight: "bold", color: "#a5b4fc", letterSpacing: 3, lineHeight: 1.2 }}>
              UBVERSE STAR MAP
            </div>
            <div style={{ fontSize: 8, color: "#1e1e50", letterSpacing: 2 }}>
              UNITED BATTLE UNIVERSE · STELLAR NAVIGATION CHART v2.0
            </div>
          </div>
        </div>

        <div style={{ display: "flex", gap: 4, marginLeft: 10, flexWrap: "wrap" }}>
          {[["all","All Systems"],["wiki_real","Wiki · Real"],["wiki_fictional","Wiki · Fictional"],["real_added","Real (Added)"]].map(([v,l]) => (
            <button key={v} onClick={() => setFilter(v)} style={{
              background: filter===v ? "#1e1b4b" : "transparent",
              border: "1px solid " + (filter===v ? "#4f46e5" : "#1a1a35"),
              color: filter===v ? "#a5b4fc" : "#374151",
              padding: "3px 9px", borderRadius: 3, cursor: "pointer", fontSize: 9, letterSpacing: 1,
            }}>{l}</button>
          ))}
          <button onClick={() => { setPan({ x:0, y:0 }); setZoom(1); }} style={{
            background: "transparent", border: "1px solid #1a1a35", color: "#374151",
            padding: "3px 9px", borderRadius: 3, cursor: "pointer", fontSize: 9, marginLeft: 5,
          }}>⟲ RESET</button>
        </div>

        <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 10 }}>
          <span style={{ fontSize: 9, color: "#1a1a40", letterSpacing: 1, fontVariantNumeric: "tabular-nums" }}>
            ZOOM {Math.round(zoom * 100)}%
          </span>
          <span style={{ fontSize: 8, color: "#12122a", letterSpacing: 1 }}>
            {isMobile ? "DRAG · PINCH · TAP" : "SCROLL · DRAG · CLICK"}
          </span>
        </div>
      </div>

      {/* ── BODY ── */}
      <div style={{ flex: 1, display: "flex", overflow: "hidden", position: "relative" }}>

        <svg ref={svgRef}
          style={{ flex: 1, cursor: dragging ? "grabbing" : "crosshair", display: "block", touchAction: "none" }}
          onMouseDown={onDown} onMouseMove={onMove} onMouseUp={onUp} onMouseLeave={onUp}
          onClick={() => { if (!didDrag.current) setSel(null); }}>

          <defs>
            <filter id="glow2" x="-60%" y="-60%" width="220%" height="220%">
              <feGaussianBlur stdDeviation="3" result="b"/>
              <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
            </filter>
            <radialGradient id="voidFill" cx="50%" cy="50%">
              <stop offset="0%"   stopColor="#4c1d95" stopOpacity="0.22"/>
              <stop offset="60%"  stopColor="#2e1065" stopOpacity="0.12"/>
              <stop offset="100%" stopColor="#1e0a50" stopOpacity="0"/>
            </radialGradient>
          </defs>

          <rect width="100%" height="100%" fill="#04040e"/>

          {/* Fixed grid lines (screen-space, always visible) */}
          <g opacity="0.018">
            {Array.from({length:28},(_,i)=>(
              <line key={"gv"+i} x1={i*70} y1={0} x2={i*70} y2={2000} stroke="#6366f1" strokeWidth={0.5}/>
            ))}
            {Array.from({length:18},(_,i)=>(
              <line key={"gh"+i} x1={0} y1={i*70} x2={2000} y2={i*70} stroke="#6366f1" strokeWidth={0.5}/>
            ))}
          </g>

          {/* ── WORLD TRANSFORM GROUP — origin at (cx, cy) ── */}
          {/* All child positions are in world-space; multiply by zoom to get screen offset from centre */}
          <g transform={`translate(${cx}, ${cy}) scale(${zoom})`}>

            {/* Background stars (world-space positions) */}
            {BG_STARS.map((s,i) => (
              <circle key={i} cx={s.x} cy={s.y} r={s.r / zoom} fill="white" opacity={s.o}/>
            ))}



            {/* Sol crosshair */}
            <line x1={0} y1={-12} x2={0} y2={12} stroke="#8b5cf6" strokeWidth={0.7 / zoom} opacity={0.4}/>
            <line x1={-12} y1={0} x2={12} y2={0} stroke="#8b5cf6" strokeWidth={0.7 / zoom} opacity={0.4}/>

            {/* The Silent Void nebula */}
            <ellipse cx={voidCX} cy={voidCY} rx={voidRX} ry={voidRY} fill="url(#voidFill)"/>
            <ellipse cx={voidCX} cy={voidCY} rx={voidRX} ry={voidRY} fill="none"
              stroke="#6d28d9" strokeWidth={1.3 / zoom} strokeDasharray={`${14/zoom},${7/zoom}`} opacity={0.38}/>
            <text x={voidCX} y={voidCY - voidRY - 16} textAnchor="middle"
              fill="#7c3aed" fontSize={12 / zoom} fontStyle="italic" letterSpacing={6} opacity={0.6}>
              THE SILENT VOID
            </text>
            <text x={voidCX} y={voidCY - voidRY - 4} textAnchor="middle"
              fill="#5b21b6" fontSize={8 / zoom} letterSpacing={3} opacity={0.3}>
              LARGELY UNEXPLORED
            </text>

            {/* ── STAR SYSTEMS ── */}
            {shown.map(sys => {
              const fc = FACTION[sys.faction];
              const tc = TYPE[sys.type];
              const isSel = sel?.id === sys.id;
              const r = sys.size / zoom;

              return (
                <g key={sys.id} transform={`translate(${sys.x}, ${sys.y})`}
                  style={{ cursor: "pointer" }}
                  onClick={e => { e.stopPropagation(); if (!didDrag.current) setSel(isSel ? null : sys); }}
                  onMouseEnter={e => { setTip(sys); setTipPos({ x: e.clientX, y: e.clientY }); }}
                  onMouseMove={e => setTipPos({ x: e.clientX, y: e.clientY })}
                  onMouseLeave={() => setTip(null)}>

                  {/* Selection rings */}
                  {isSel && <>
                    <circle r={(sys.size+14)/zoom} fill="none" stroke={fc.color} strokeWidth={0.5/zoom} opacity={0.18}/>
                    <circle r={(sys.size+9)/zoom}  fill="none" stroke={fc.color} strokeWidth={1/zoom}   opacity={0.35} strokeDasharray={`${4/zoom},${4/zoom}`}/>
                  </>}

                  {/* Faction halo */}
                  <circle r={(sys.size+6)/zoom} fill={fc.color} opacity={isSel ? 0.18 : 0.07}/>

                  {/* Mobile orbit dashes */}
                  {sys.mobile && (
                    <circle r={(sys.size+7)/zoom} fill="none" stroke={fc.color}
                      strokeWidth={1/zoom} strokeDasharray={`${5/zoom},${4/zoom}`} opacity={0.65}/>
                  )}

                  {/* Star body */}
                  <circle r={r} fill={tc.dot} stroke={fc.color}
                    strokeWidth={(isSel ? 2.5 : 1.5)/zoom} filter="url(#glow2)" opacity={0.93}/>

                  {/* Inner core */}
                  <circle r={r * (sys.size >= 6 ? 0.42 : 0.5)} fill="white"
                    opacity={sys.size >= 6 ? 0.55 : 0.35}/>

                  {/* Label */}
                  <text x={0} y={r + 13/zoom} textAnchor="middle"
                    fill={isSel ? "#c4b5fd" : "rgba(148,163,184,0.65)"}
                    fontSize={(isSel ? 9 : 8) / zoom}
                    fontWeight={isSel ? "bold" : "normal"}
                    letterSpacing={0.4 / zoom}>
                    {sys.name}
                  </text>
                </g>
              );
            })}
          </g>
        </svg>

        {/* ── DETAIL PANEL — side panel on desktop, bottom sheet on mobile ── */}
        {sel && (
          isMobile ? (
            // ── MOBILE: bottom sheet ──
            <div style={{
              position: "fixed", bottom: 0, left: 0, right: 0,
              background: "#060618", borderTop: "1px solid #1e1b4b",
              maxHeight: "55vh", display: "flex", flexDirection: "column",
              zIndex: 500, borderRadius: "14px 14px 0 0",
              boxShadow: "0 -8px 40px rgba(99,102,241,0.18)",
            }}>
              {/* drag handle */}
              <div style={{ display: "flex", justifyContent: "center", padding: "10px 0 4px" }}>
                <div style={{ width: 36, height: 4, borderRadius: 2, background: "#1e1e50" }}/>
              </div>
              <div style={{ padding: "0 15px 6px", borderBottom: "1px solid #0e0e28",
                display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                <div>
                  <div style={{ fontSize: 15, fontWeight: "bold", color: "#c4b5fd", letterSpacing: 1 }}>{sel.name}</div>
                  <div style={{ fontSize: 8, color: "#1e1e50", letterSpacing: 2 }}>SYSTEM RECORD</div>
                </div>
                <button onClick={() => setSel(null)} style={{ background: "none", border: "none",
                  color: "#4a4a70", cursor: "pointer", fontSize: 26, lineHeight: 1, padding: "0 4px" }}>×</button>
              </div>
              <div style={{ flex: 1, overflowY: "auto", padding: "12px 15px 24px" }}>
                <div style={{ display: "flex", gap: 5, marginBottom: 11, flexWrap: "wrap" }}>
                  {[
                    [TYPE[sel.type].dot, TYPE[sel.type].label],
                    [FACTION[sel.faction].color, FACTION[sel.faction].name],
                    ...(sel.mobile ? [["#f59e0b","⊛ MOBILE"]] : []),
                    ...(sel.inVoid ? [["#7c3aed","◌ SILENT VOID"]] : []),
                  ].map(([c,l]) => (
                    <span key={l} style={{ background: c+"16", border: "1px solid "+c+"40", color: c,
                      padding: "2px 8px", borderRadius: 2, fontSize: 9, letterSpacing: 1 }}>{l.toUpperCase()}</span>
                  ))}
                </div>
                <p style={{ color: "#8892a4", fontSize: 11, lineHeight: 1.7, margin: "0 0 12px" }}>{sel.description}</p>
                <div style={{ borderTop: "1px solid #0e0e24", paddingTop: 10, marginBottom: 11 }}>
                  <div style={{ fontSize: 8, color: "#1a1a45", letterSpacing: 2, marginBottom: 7 }}>STELLAR DATA</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "6px 10px" }}>
                    {[["CLASS", sel.starClass],["TYPE", sel.starType],
                      sel.distancePc != null ? ["WORLD COORDS",`(${sel.x}, ${sel.y})`] : ["POSITION","Variable / Mobile"]
                    ].map(([k,v]) => (
                      <div key={k}>
                        <div style={{ fontSize: 7.5, color: "#1a2840", letterSpacing: 1, marginBottom: 2 }}>{k}</div>
                        <div style={{ fontSize: 10, color: "#8892a4" }}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{ borderTop: "1px solid #0e0e24", paddingTop: 10 }}>
                  <div style={{ fontSize: 8, color: "#1a1a45", letterSpacing: 2, marginBottom: 7 }}>KNOWN BODIES</div>
                  {sel.bodies.map((b,i) => (
                    <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 7, marginBottom: 6 }}>
                      <span style={{ color: TYPE[sel.type].dot, fontSize: 7, marginTop: 3, flexShrink: 0 }}>◆</span>
                      <span style={{ fontSize: 10, color: "#8892a4", lineHeight: 1.5 }}>{b}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          ) : (
            // ── DESKTOP: side panel ──
            <div style={{ width: 304, background: "#060618", borderLeft: "1px solid #0e0e28",
              display: "flex", flexDirection: "column", overflow: "hidden" }}>
              <div style={{ padding: "13px 15px 10px", borderBottom: "1px solid #0e0e28",
                display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div>
                  <div style={{ fontSize: 15, fontWeight: "bold", color: "#c4b5fd", letterSpacing: 1, lineHeight: 1.2, marginBottom: 4 }}>
                    {sel.name}
                  </div>
                  <div style={{ fontSize: 8, color: "#1e1e50", letterSpacing: 2 }}>SYSTEM RECORD</div>
                </div>
                <button onClick={() => setSel(null)} style={{ background: "none", border: "none",
                  color: "#2d2d50", cursor: "pointer", fontSize: 22, lineHeight: 1, padding: 0, marginTop: -3 }}>×</button>
              </div>
              <div style={{ flex: 1, overflowY: "auto", padding: "13px 15px" }}>
                <div style={{ display: "flex", gap: 5, marginBottom: 13, flexWrap: "wrap" }}>
                  {[
                    [TYPE[sel.type].dot, TYPE[sel.type].label],
                    [FACTION[sel.faction].color, FACTION[sel.faction].name],
                    ...(sel.mobile ? [["#f59e0b","⊛ MOBILE"]] : []),
                    ...(sel.inVoid ? [["#7c3aed","◌ SILENT VOID"]] : []),
                  ].map(([c,l]) => (
                    <span key={l} style={{ background: c+"16", border: "1px solid "+c+"40", color: c,
                      padding: "2px 8px", borderRadius: 2, fontSize: 9, letterSpacing: 1 }}>{l.toUpperCase()}</span>
                  ))}
                </div>
                <p style={{ color: "#8892a4", fontSize: 10.5, lineHeight: 1.75, margin: "0 0 14px" }}>{sel.description}</p>
                <div style={{ borderTop: "1px solid #0e0e24", paddingTop: 11, marginBottom: 13 }}>
                  <div style={{ fontSize: 8, color: "#1a1a45", letterSpacing: 2, marginBottom: 8 }}>STELLAR DATA</div>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "7px 10px" }}>
                    {[["CLASS", sel.starClass],["TYPE", sel.starType],
                      sel.distancePc != null ? ["WORLD COORDS",`(${sel.x}, ${sel.y})`] : ["POSITION","Variable / Mobile"]
                    ].map(([k,v]) => (
                      <div key={k}>
                        <div style={{ fontSize: 7.5, color: "#1a2840", letterSpacing: 1, marginBottom: 2 }}>{k}</div>
                        <div style={{ fontSize: 9.5, color: "#8892a4" }}>{v}</div>
                      </div>
                    ))}
                  </div>
                </div>
                <div style={{ borderTop: "1px solid #0e0e24", paddingTop: 11 }}>
                  <div style={{ fontSize: 8, color: "#1a1a45", letterSpacing: 2, marginBottom: 8 }}>KNOWN BODIES</div>
                  {sel.bodies.map((b,i) => (
                    <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 7, marginBottom: 6 }}>
                      <span style={{ color: TYPE[sel.type].dot, fontSize: 7, marginTop: 3, flexShrink: 0 }}>◆</span>
                      <span style={{ fontSize: 9.5, color: "#8892a4", lineHeight: 1.5 }}>{b}</span>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )
        )}
      </div>

      {/* ── LEGEND ── */}
      <div style={{ padding: "7px 18px", borderTop: "1px solid #0a0a20",
        background: "#06061a", display: "flex", gap: 16, flexWrap: "wrap", alignItems: "center" }}>
        <span style={{ fontSize: 8, color: "#1a1a40", letterSpacing: 2 }}>TYPE</span>
        {Object.entries(TYPE).map(([k,v]) => (
          <span key={k} style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <span style={{ width: 7, height: 7, borderRadius: "50%", background: v.dot,
              display: "inline-block", boxShadow: "0 0 5px "+v.dot }}/>
            <span style={{ fontSize: 8, color: "#2d3748" }}>{v.label}</span>
          </span>
        ))}
        <span style={{ fontSize: 8, color: "#1a1a40", letterSpacing: 2, marginLeft: 8 }}>FACTION</span>
        {Object.entries(FACTION).map(([k,v]) => (
          <span key={k} style={{ display: "flex", alignItems: "center", gap: 5 }}>
            <span style={{ width: 7, height: 7, borderRadius: "50%", background: v.color, display: "inline-block" }}/>
            <span style={{ fontSize: 8, color: "#2d3748" }}>{v.name}</span>
          </span>
        ))}
      </div>

      {/* ── TOOLTIP — desktop only ── */}
      {tip && !isMobile && (
        <div style={{ position: "fixed", left: tipPos.x+15, top: tipPos.y-52,
          background: "#09091e", border: "1px solid #1e1b4b",
          padding: "7px 12px", borderRadius: 5, fontSize: 11,
          pointerEvents: "none", zIndex: 1000,
          boxShadow: "0 0 24px rgba(99,102,241,0.18)" }}>
          <div style={{ color: "#a5b4fc", fontWeight: "bold", letterSpacing: 1, marginBottom: 2 }}>{tip.name}</div>
          <div style={{ color: "#374151", fontSize: 9, letterSpacing: 1 }}>{tip.starType}</div>
          <div style={{ color: FACTION[tip.faction].color, fontSize: 9, letterSpacing: 1, marginTop: 2 }}>
            {FACTION[tip.faction].name}
          </div>
          <div style={{ color: "#1a1a40", fontSize: 8, letterSpacing: 1, marginTop: 2 }}>
            ({tip.x}, {tip.y})
          </div>
        </div>
      )}
    </div>
  );
}

    // (everything from the import lines down to the closing brace)
    // But remove the import line at the top — replace it with:

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
